name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            node: 22
          - os: ubuntu-latest
            node: 22
          # windows-latest upgraded to Node 22 as of 2026-06-14.
          # The historical ncrypto::CSPRNG assertion in Node 22 + node-pty + ConPTY
          # was resolved in a later Node 22 patch. Revert to node: 20 if the crash
          # re-appears and update docs/windows-support.md.
          - os: windows-latest
            node: 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: MCP transport lanes
        run: npm run test:mcp
