name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            node: 22
          - os: ubuntu-latest
            node: 22
          # windows-latest pinned to Node 20 until Node 22 + node-pty + ConPTY
          # stops asserting in ncrypto::CSPRNG on PTY-spawned node subprocesses.
          # See docs/windows-support.md "Known upstream issues".
          - os: windows-latest
            node: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: MCP transport lanes
        run: npm run test:mcp
