name: Publish

on:
  push:
    tags:
      - "v*"

# OIDC trusted publishing to npm (no NPM_TOKEN secret), plus a GitHub Release.
permissions:
  contents: write # create the GitHub Release
  id-token: write # mint the OIDC token npm exchanges for a short-lived publish token

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # prepublishOnly runs the full gate: clean, build, typecheck, lint, test, test:mcp.
      # Provenance is generated automatically by trusted publishing.
      - name: Publish to npm
        run: npm publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
